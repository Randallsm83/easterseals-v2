name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: vps54643.dreamhostps.com
          username: easterseals
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            export PATH="$HOME/.local/bin:$PATH"
            eval "$(mise activate bash)"
            cd ~/app
            git checkout -- client/package.json || true
            rm -f client/scripts/generate-spa-fallbacks.mjs
            git pull --ff-only origin main
            npm ci
            npm run build
            cp -r client/dist/* ~/es2.randall.codes/
            pm2 delete es2-api 2>/dev/null || true
            NODE_ENV=production PORT=8080 pm2 start server/dist/index.js --name es2-api -i max
            pm2 save
            SPA_FALLBACK_API_BASE_URL=http://127.0.0.1:8080/api node client/scripts/generate-spa-fallbacks.mjs ~/es2.randall.codes
